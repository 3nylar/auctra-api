    Transaction:
      type: object
      properties:
        object: { type: string, const: transaction }
        hash: { type: string }
        status: { type: string, enum: [pending, confirmed, reverted] }
        block_number: { type: [integer, "null"] }
        confirmations: { type: integer }
        gas_used: { type: [string, "null"] }
        effective_gas_price: { type: [string, "null"] }

    Health:
      type: object
      properties:
        object: { type: string, const: health }
        status: { type: string, enum: [ok, degraded] }
        environment: { type: string, enum: [sandbox, production] }
        chain_id: { type: integer }
        head_block: { type: [integer, "null"] }
        database: { type: string }
        rpc: { type: string }
        managed_signer: { type: string, enum: [enabled, disabled] }

    Error:
      type: object
      properties:
        error:
          type: object
          required: [type, code, message, request_id]
          properties:
            type:
              type: string
              enum:
                - authentication_error
                - permission_error
                - invalid_request_error
                - chain_error
                - idempotency_error
                - rate_limit_error
                - api_error
            code:
              type: string
              description: Switch on this. Messages change; codes don't.
            message: { type: string }
            param: { type: string }
            detail: { type: object }
            request_id:
              type: string
              description: Quote this in a support request. It's the only string we need.
            docs_url: { type: string, format: uri }

  responses:
    BadRequest:
      description: The request was malformed or violated an auction rule.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing, invalid, revoked, or wrong-environment API key.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: No such object under this API key's organisation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    IdempotencyConflict:
      description: The Idempotency-Key was reused with a different body, or is still in flight.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ChainError:
      description: |
        The chain rejected the transaction. `message` carries the decoded custom
        error from AuctionHouse.sol, not "execution reverted".
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: |
        Too many requests. Limits are per API key, not per IP. `Retry-After`
        tells you when to come back.
      headers:
        Retry-After: { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
