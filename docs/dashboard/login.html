<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in — Auctra</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="dashboard.css">
<script>
  try {
    const t = localStorage.getItem("auctra-theme");
    if (t) document.documentElement.dataset.theme = t;
    else if (matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.dataset.theme = "dark";
  } catch {}
</script>
</head>
<body style="background:var(--paper)">

<div class="dash-shell">
  <a class="dash-wordmark" href="../introduction.html"><b>Auctra</b><span>Dashboard</span></a>

  <div class="dash-card">
    <h1>Log in</h1>
    <p class="lede">Manage your organisation's API keys.</p>

    <div class="dash-error" id="err"></div>

    <form id="login-form">
      <div class="dash-field">
        <label for="email">Email</label>
        <input id="email" type="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="dash-field">
        <label for="password">Password</label>
        <input id="password" type="password" required placeholder="Your password" autocomplete="current-password">
      </div>
      <button class="dash-btn" type="submit" id="submit-btn">Log in</button>
    </form>

    <p class="dash-switch">No account yet? <a href="signup.html">Sign up</a></p>
  </div>
</div>

<script src="client.js"></script>
<script>
  const form = document.getElementById("login-form");
  const errEl = document.getElementById("err");
  const btn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError(errEl);
    btn.disabled = true;
    btn.textContent = "Logging in...";

    try {
      await api("POST", "/v1/auth/login", {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      });
      window.location.href = "index.html";
    } catch (err) {
      showError(errEl, err);
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
